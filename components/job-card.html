<!-- components/job-card.html -->
<div class="job-card" data-id="{{id}}">
    <div class="job-card-header">
        <span class="job-card-type {{featuredClass}}">{{type}}</span>
        {{featuredBadge}}
    </div>
    <h3>{{title}}</h3>
    <div class="job-card-meta">
        <span>📍 {{country}}</span>
        <span>📂 {{category}}</span>
    </div>
    <div class="job-card-footer">
        <span class="job-card-salary">{{salary}}</span>
        <span class="job-card-link">View Details →</span>
    </div>
</div>
