<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Robert Walter Recruitment Agency</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    <div id="navbar-container"></div>
    <main>
        <section class="section auth-section">
            <div class="container auth-container">
                <div class="auth-card">
                    <h2>Create Account</h2>
                    <p class="auth-subtitle">Join our talent network</p>
                    <form id="register-form">
                        <div class="form-group"><label for="reg-name">Full Name</label><input type="text" id="reg-name" required></div>
                        <div class="form-group"><label for="reg-email">Email</label><input type="email" id="reg-email" required></div>
                        <div class="form-group"><label for="reg-password">Password</label><input type="password" id="reg-password" required minlength="6"></div>
                        <div class="form-group"><label for="reg-role">I am a:</label><select id="reg-role"><option value="applicant">Applicant</option><option value="admin">Admin</option></select></div>
                        <button type="submit" class="btn btn-primary btn-block">Register</button>
                        <div id="register-message"></div>
                    </form>
                    <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
                </div>
            </div>
        </section>
    </main>
    <div id="footer-container"></div>
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
